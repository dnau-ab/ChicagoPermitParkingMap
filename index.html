<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chicago Permit Parking Maps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #dbe3ee;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.7rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.9;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover,
    a:focus {
      color: var(--accent-hover);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Chicago Permit Parking Geocoder Outputs</h1>
    <span><strong>Data as of Feb 21 2026 </strong><a href="https://data.cityofchicago.org/Transportation/Parking-Permit-Zones/u9xt-hiju/about_data" target="_blank">(Source)</a></span>
    <br/>
    <br/>
    <p>Select a geocoder to open the map:</p>
    <ul>
      <li><a href="output/parking_permit_zones_map_all_arcgis_20260315.html">ArcGIS (Recommended)</a></li>
      <li><a href="output/parking_permit_zones_map_all_nominatim_20260314.html">Nominatim</a></li>
    </ul>
  </main>
</body>
</html>
